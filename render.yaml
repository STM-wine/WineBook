services:
  - type: web
    name: winebook-web
    runtime: node
    rootDir: apps/web
    plan: starter
    buildCommand: npm ci && python3 -m pip install -r requirements-grw.txt && npm run build
    startCommand: npm run start
    autoDeploy: false
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: GITHUB_WORKFLOW_DISPATCH_TOKEN
        sync: false
      - key: GITHUB_WORKFLOW_REPO
        value: STM-wine/WineBook
      - key: GITHUB_WORKFLOW_REF
        value: main
      - key: VINOSMITH_INGEST_WORKFLOW_ID
        value: daily-vinosmith-ingest.yml
