services:
  - type: web
    name: winebook-web
    runtime: node
    rootDir: apps/web
    plan: starter
    buildCommand: npm ci && python3 -m pip install -r requirements-grw.txt && npm run build
    startCommand: npm run start
    autoDeploy: false
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
